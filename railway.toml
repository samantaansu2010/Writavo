# FIX: Moved from backend/railway.toml to project ROOT so Railway can find it.
# Also set rootDirectory to "backend" so Railway runs from the right folder.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd backend && node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
