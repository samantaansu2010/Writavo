# ⚠️  THIS FILE IS KEPT FOR REFERENCE ONLY.
# Railway reads railway.toml from the PROJECT ROOT, not from a subfolder.
# The active config is at: /railway.toml (root of this repo)
# DO NOT edit this file — edit /railway.toml instead.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
