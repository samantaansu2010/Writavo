name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Lint & Syntax Check ──────────────────────────────────────────────────
  lint:
    name: Lint & Syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Check for syntax errors (dry-run node)
        run: node --check server.js

  # ── Security Audit ───────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run npm audit (high severity only)
        run: npm audit --audit-level=high
        continue-on-error: true   # Warn but don't block deploy on low/moderate

  # ── Docker build check ───────────────────────────────────────────────────
  docker-check:
    name: Dockerfile validity
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile exists (Railway uses it if present)
        run: |
          if [ -f backend/Dockerfile ]; then
            docker build -t writavo-check ./backend --no-cache --quiet
            echo "Docker build ✅"
          else
            echo "No Dockerfile — Railway will auto-detect Node.js ✅"
          fi
        continue-on-error: true

  # ── Notify on failure ────────────────────────────────────────────────────
  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [lint, audit]
    if: failure()
    steps:
      - name: Print failure summary
        run: |
          echo "❌ CI failed on branch ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
