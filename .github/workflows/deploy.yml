name: Deploy to Railway

on:
  push:
    branches: [main]

# Cancel in-progress deploys if a new one is triggered
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy → Railway
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --prefer-offline

      - name: Syntax check before deploy
        working-directory: backend
        run: node --check server.js

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "⚠️  RAILWAY_TOKEN secret not set — skipping auto-deploy."
            echo "Add it at: GitHub repo → Settings → Secrets → RAILWAY_TOKEN"
            echo "Get your token: railway.app → Account → API Tokens"
            exit 0
          fi
          railway up --service backend --detach
          echo "✅ Deployed to Railway"

      - name: Health check after deploy
        env:
          RAILWAY_APP_URL: ${{ secrets.RAILWAY_APP_URL }}
        run: |
          if [ -z "$RAILWAY_APP_URL" ]; then
            echo "RAILWAY_APP_URL not set — skipping health check"
            exit 0
          fi
          echo "Waiting 30s for Railway to spin up..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RAILWAY_APP_URL/api/health")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $STATUS)"
          else
            echo "⚠️  Health check returned HTTP $STATUS"
          fi
