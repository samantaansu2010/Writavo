<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Writavo</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#111110;--ink-soft:#3d3d3a;--ink-muted:#7a7a74;--ink-faint:#b8b8b0;--paper:#faf9f7;--paper-warm:#f5f4f0;--paper-hover:#f0efe9;--border:#e8e6df;--accent:#c8622a;--accent-soft:#f5e8df;--red:#c43030;--green:#2d7a4a;--font-serif:'Lora',Georgia,serif;--font-sans:'DM Sans',-apple-system,sans-serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;display:grid;place-items:center;padding:20px;}
    a{text-decoration:none;color:inherit;}

    .login-card { width: 100%; max-width: 440px; }
    .login-logo { font-family: var(--font-serif); font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 32px; }
    .login-logo span { color: var(--accent); }
    .login-title { font-family: var(--font-serif); font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .login-sub { font-size: 15px; color: var(--ink-muted); margin-bottom: 28px; }
    .login-sub a { color: var(--accent); font-weight: 500; }

    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:13px;font-weight:500;color:var(--ink-soft);margin-bottom:6px;}
    .form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--paper);color:var(--ink);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s;font-family:inherit;}
    .form-input:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(17,17,16,.07);}
    .form-input.error{border-color:var(--red);}
    .form-input::placeholder{color:var(--ink-faint);}
    .form-error{font-size:12px;color:var(--red);margin-top:4px;}

    .pw-wrap{position:relative;}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-faint);padding:4px;transition:color .2s;}
    .pw-toggle:hover{color:var(--ink);}
    .forgot-link { display: flex; justify-content: flex-end; margin-top: -10px; margin-bottom: 16px; }
    .forgot-link a { font-size: 13px; color: var(--ink-muted); transition: color .2s; }
    .forgot-link a:hover { color: var(--accent); }

    .submit-btn{width:100%;padding:13px;background:var(--ink);color:white;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
    .submit-btn:hover{background:var(--ink-soft);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.15);}
    .submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none;}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .divider-text{display:flex;align-items:center;gap:12px;color:var(--ink-faint);font-size:13px;margin:20px 0;}
    .divider-text::before,.divider-text::after{content:'';flex:1;height:1px;background:var(--border);}
    .google-btn{width:100%;padding:11px;background:white;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;font-family:inherit;color:var(--ink);}
    .google-btn:hover{background:var(--paper-warm);border-color:var(--ink-faint);}

    .alert{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;}
    .alert-error{background:#fce8e8;color:#c43030;border:1px solid #f5c6c6;}
    .alert-success{background:#d8f0e4;color:#1a5c35;border:1px solid #b4dbc5;}
  </style>
</head>
<body>
<div class="login-card">
  <a href="/index.html" class="login-logo">Writav<span>o</span></a>
  <h1 class="login-title">Welcome back</h1>
  <p class="login-sub">New to Writavo? <a href="/signup.html">Create an account</a></p>

  <div id="alertBox" class="alert" style="display:none"></div>

  <div class="form-group">
    <label class="form-label" for="email">Email address</label>
    <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
    <div class="form-error" id="emailErr"></div>
  </div>

  <div class="form-group">
    <label class="form-label" for="password">Password</label>
    <div class="pw-wrap">
      <input class="form-input" type="password" id="password" placeholder="Your password" autocomplete="current-password">
      <button type="button" class="pw-toggle" onclick="togglePw()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="form-error" id="passwordErr"></div>
  </div>
  <div class="forgot-link"><a href="/forgot-password.html">Forgot password?</a></div>

  <button class="submit-btn" id="submitBtn" onclick="handleLogin()">Sign in</button>

  <div class="divider-text">or</div>
  <button class="google-btn" onclick="handleGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
</div>

<script type="module">
  import { Auth, toast } from './scripts/api.js';

  // Handle OAuth redirect (token in URL from Google callback)
  const params = new URLSearchParams(location.search);
  if (params.get('token')) {
    Auth.store({ accessToken: params.get('token'), refreshToken: params.get('refresh') });
    // Fetch user profile to cache in localStorage
    Auth.getMe().catch(() => {});
    const next = params.get('next') || 'discover.html';
    window.location.href = next;
  }
  if (params.get('error')) {
    const el = document.getElementById('alertBox');
    el.className = 'alert alert-error';
    const errMap = {
      google_failed: 'Google sign-in failed. Please try again.',
      google_auth_failed: 'Could not authenticate with Google. Please try again.',
      oauth_failed: 'OAuth sign-in failed. Please use email/password instead.',
    };
    el.textContent = errMap[params.get('error')] || 'Sign-in failed. Please try again.';
    el.style.display = 'block';
  }

  Auth.redirectIfLoggedIn('discover.html');

  const showAlert = (msg, type = 'error') => {
    const el = document.getElementById('alertBox');
    el.className = `alert alert-${type}`;
    el.textContent = msg;
    el.style.display = 'block';
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };

  window.togglePw = () => {
    const inp = document.getElementById('password');
    const btn = document.querySelector('.pw-toggle');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.title = inp.type === 'password' ? 'Show password' : 'Hide password';
  };

  window.handleLogin = async () => {
    document.getElementById('alertBox').style.display = 'none';
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    // Clear previous errors
    document.getElementById('emailErr').textContent = '';
    document.getElementById('passwordErr').textContent = '';
    
    let valid = true;
    if (!email) { document.getElementById('emailErr').textContent = 'Email is required.'; valid = false; }
    else if (!/\S+@\S+\.\S+/.test(email)) { document.getElementById('emailErr').textContent = 'Enter a valid email.'; valid = false; }
    if (!password) { document.getElementById('passwordErr').textContent = 'Password is required.'; valid = false; }
    if (!valid) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Signing in…';

    try {
      await Auth.login(email, password);
      await Auth.getMe().catch(() => {});
      const next = params.get('next') || 'discover.html';
      window.location.href = next;
    } catch (err) {
      showAlert(err.message || 'Login failed. Check your credentials.');
      btn.disabled = false;
      btn.innerHTML = 'Sign in';
    }
  };

  // Google OAuth button — redirect to backend
  window.handleGoogle = () => {
    const btn = document.querySelector('.google-btn');
    btn.disabled = true;
    btn.innerHTML = btn.innerHTML.replace('Continue with Google', 'Redirecting…');
    window.location.href = '/api/auth/google';
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement !== document.querySelector('.google-btn')) {
      window.handleLogin();
    }
  });
</script>
</body>
</html>
