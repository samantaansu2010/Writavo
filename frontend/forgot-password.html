<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Writavo</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#111110;--ink-soft:#3d3d3a;--ink-muted:#7a7a74;--ink-faint:#b8b8b0;--paper:#faf9f7;--paper-warm:#f5f4f0;--paper-hover:#f0efe9;--border:#e8e6df;--accent:#c8622a;--accent-soft:#f5e8df;--red:#c43030;--green:#2d7a4a;--font-serif:'Lora',Georgia,serif;--font-sans:'DM Sans',-apple-system,sans-serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;display:grid;place-items:center;padding:20px;}
    a{text-decoration:none;color:inherit;}

    .card{width:100%;max-width:420px;}
    .logo{font-family:var(--font-serif);font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-bottom:32px;display:block;}
    .logo span{color:var(--accent);}
    .page-title{font-family:var(--font-serif);font-size:24px;font-weight:700;margin-bottom:6px;}
    .page-sub{font-size:14px;color:var(--ink-muted);margin-bottom:28px;line-height:1.5;}
    .page-sub a{color:var(--accent);font-weight:500;}

    .form-group{margin-bottom:18px;}
    .form-label{display:block;font-size:13px;font-weight:500;color:var(--ink-soft);margin-bottom:6px;}
    .form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--paper);color:var(--ink);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s;font-family:inherit;}
    .form-input:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(17,17,16,.07);}
    .form-input::placeholder{color:var(--ink-faint);}

    .submit-btn{width:100%;padding:13px;background:var(--ink);color:white;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
    .submit-btn:hover{background:var(--ink-soft);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.15);}
    .submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none;}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .alert{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;line-height:1.5;}
    .alert-error{background:#fce8e8;color:#c43030;border:1px solid #f5c6c6;}
    .alert-success{background:#d8f0e4;color:#1a5c35;border:1px solid #b4dbc5;}

    .back-link{margin-top:20px;text-align:center;font-size:14px;color:var(--ink-muted);}
    .back-link a{color:var(--accent);font-weight:500;}

    .success-icon{font-size:48px;text-align:center;margin-bottom:16px;}
  </style>
</head>
<body>
<div class="card">
  <a href="/index.html" class="logo">Writav<span>o</span></a>

  <div id="requestView">
    <h1 class="page-title">Forgot password?</h1>
    <p class="page-sub">Enter your email and we'll send you a reset link.</p>

    <div id="alertBox" class="alert" style="display:none"></div>

    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Send reset link</button>

    <div class="back-link"><a href="/login.html">← Back to sign in</a></div>
  </div>

  <div id="successView" style="display:none">
    <div class="success-icon">📬</div>
    <h1 class="page-title" style="text-align:center">Check your email</h1>
    <p class="page-sub" style="text-align:center">
      If an account with that email exists, we've sent a password reset link. 
      Check your inbox (and spam folder).
    </p>
    <div class="back-link" style="margin-top:24px"><a href="/login.html">← Back to sign in</a></div>
  </div>
</div>

<script type="module">
  import { API } from './scripts/api.js';

  const showAlert = (msg, type = 'error') => {
    const el = document.getElementById('alertBox');
    el.className = `alert alert-${type}`;
    el.textContent = msg;
    el.style.display = 'block';
  };

  window.handleSubmit = async () => {
    const email = document.getElementById('email').value.trim();
    if (!email) { showAlert('Please enter your email address.'); return; }
    if (!/\S+@\S+\.\S+/.test(email)) { showAlert('Please enter a valid email address.'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Sending…';

    try {
      await API.post('/auth/forgot-password', { email });
      // Always show success (backend doesn't reveal if email exists)
      document.getElementById('requestView').style.display = 'none';
      document.getElementById('successView').style.display = 'block';
    } catch (err) {
      showAlert(err.message || 'Failed to send reset email. Please try again.');
      btn.disabled = false;
      btn.innerHTML = 'Send reset link';
    }
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.handleSubmit();
  });
</script>
</body>
</html>
