<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Writavo</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Source Sans 3',sans-serif;background:#f7f6f2;color:#222;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .card{background:white;border:1px solid #ddd;border-radius:10px;padding:44px 40px;max-width:440px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.07)}
  .logo{font-family:'Libre Baskerville',serif;font-size:1.6rem;font-weight:700;color:#2c3e6b;margin-bottom:28px;display:block;text-decoration:none;text-align:center}
  h1{font-family:'Libre Baskerville',serif;font-size:1.45rem;color:#1a1a2e;margin-bottom:8px;text-align:center}
  .subtitle{font-size:0.9rem;color:#777;text-align:center;margin-bottom:26px;line-height:1.65;font-weight:300}
  label{display:block;font-size:0.83rem;font-weight:600;color:#444;margin-bottom:5px}
  input{width:100%;padding:10px 12px;border:1.5px solid #d0d4e8;border-radius:5px;font-family:'Source Sans 3',sans-serif;font-size:0.9rem;background:#fafafa;outline:none;transition:border-color .2s;margin-bottom:14px}
  input:focus{border-color:#2c3e6b;background:white}
  .input-wrap{position:relative}
  .input-wrap input{padding-right:42px;margin-bottom:0}
  .eye-btn{position:absolute;right:12px;top:10px;background:none;border:none;cursor:pointer;font-size:1rem;color:#888;padding:0}
  .form-group{margin-bottom:14px}
  .btn{display:block;width:100%;padding:12px;border-radius:5px;font-family:'Source Sans 3',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;border:none;transition:opacity .2s;text-align:center;text-decoration:none}
  .btn-primary{background:#2c3e6b;color:white;margin-top:6px}
  .btn-primary:hover{opacity:.88}
  .btn-primary:disabled{opacity:.55;cursor:not-allowed}
  .status-box{padding:12px 16px;border-radius:6px;font-size:0.87rem;margin-bottom:16px;display:none}
  .status-box.success{background:#f0fdf4;border:1.5px solid #86efac;color:#166534}
  .status-box.error{background:#fff1f2;border:1.5px solid #fca5a5;color:#991b1b}
  .status-box.show{display:block}
  .back{text-align:center;margin-top:16px;font-size:0.84rem;color:#999}
  .back a{color:#2c3e6b;font-weight:600;text-decoration:none}
  .strength{height:4px;border-radius:2px;background:#eee;margin-top:6px;overflow:hidden;transition:width .3s}
  .strength-bar{height:100%;border-radius:2px;width:0;transition:width .4s,background .3s}
  .strength-label{font-size:0.74rem;color:#999;margin-top:4px}
  .spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <a href="index.html" class="logo">Writavo</a>

  <!-- STEP 1: Request reset -->
  <div id="requestView">
    <h1>Forgot Password?</h1>
    <p class="subtitle">Enter your email and we'll send you a reset link.</p>
    <div id="reqStatus" class="status-box"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="resetEmail" placeholder="you@email.com" />
    </div>
    <button class="btn btn-primary" id="reqBtn" onclick="requestReset()">Send Reset Link</button>
    <div class="back"><a href="login.html">← Back to Login</a></div>
  </div>

  <!-- STEP 2: Set new password (token in URL) -->
  <div id="resetView" style="display:none">
    <h1>Set New Password</h1>
    <p class="subtitle">Choose a strong password for your Writavo account.</p>
    <div id="resetStatus" class="status-box"></div>
    <div class="form-group">
      <label>New Password</label>
      <div class="input-wrap">
        <input type="password" id="newPass" placeholder="Min. 8 characters" oninput="checkStrength(this.value)" />
        <button class="eye-btn" onclick="toggle('newPass', this)">👁</button>
      </div>
      <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <input type="password" id="confirmPass" placeholder="Repeat password" />
        <button class="eye-btn" onclick="toggle('confirmPass', this)">👁</button>
      </div>
    </div>
    <button class="btn btn-primary" id="resetBtn" onclick="submitReset()">Reset Password</button>
    <div class="back"><a href="login.html">← Back to Login</a></div>
  </div>

  <!-- STEP 3: Done -->
  <div id="doneView" style="display:none;text-align:center">
    <div style="font-size:3rem;margin-bottom:12px">🔐</div>
    <h1>Password Updated!</h1>
    <p class="subtitle">Your password has been reset. You can now log in.</p>
    <a href="login.html" class="btn btn-primary">Go to Login</a>
  </div>
</div>

<script type="module">
  import { API } from './scripts/api.js';

  const params = new URLSearchParams(location.search);
  const token  = params.get('token');

  // If there's a token in URL, show the reset form
  if (token) {
    document.getElementById('requestView').style.display = 'none';
    document.getElementById('resetView').style.display   = 'block';
  }

  function status(viewPrefix, type, msg) {
    const el = document.getElementById(viewPrefix + 'Status');
    el.textContent = msg;
    el.className   = `status-box ${type} show`;
  }

  window.toggle = function(id, btn) {
    const el = document.getElementById(id);
    el.type  = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? '👁' : '🙈';
  };

  window.checkStrength = function(val) {
    const bar   = document.getElementById('strengthBar');
    const label = document.getElementById('strengthLabel');
    let score   = 0;
    if (val.length >= 8)  score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const map = [
      { w:'0%',   c:'#ddd',    t:'' },
      { w:'25%',  c:'#ef4444', t:'Weak' },
      { w:'50%',  c:'#f97316', t:'Fair' },
      { w:'75%',  c:'#eab308', t:'Good' },
      { w:'100%', c:'#22c55e', t:'Strong ✓' },
    ];
    bar.style.width      = map[score].w;
    bar.style.background = map[score].c;
    label.textContent    = map[score].t;
  };

  window.requestReset = async function() {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) return status('req', 'error', 'Please enter your email address.');
    const btn = document.getElementById('reqBtn');
    btn.innerHTML = '<span class="spinner"></span>Sending…';
    btn.disabled  = true;
    try {
      await API.post('/auth/forgot-password', { email });
      status('req', 'success', '✅ Reset link sent! Check your inbox (and spam folder).');
      document.getElementById('resetEmail').disabled = true;
    } catch (e) {
      status('req', 'error', e.message || 'Failed to send reset email.');
      btn.textContent = 'Send Reset Link';
      btn.disabled = false;
    }
  };

  window.submitReset = async function() {
    const password = document.getElementById('newPass').value;
    const confirm  = document.getElementById('confirmPass').value;
    if (password.length < 8) return status('reset', 'error', 'Password must be at least 8 characters.');
    if (password !== confirm) return status('reset', 'error', 'Passwords do not match.');
    const btn = document.getElementById('resetBtn');
    btn.innerHTML = '<span class="spinner"></span>Saving…';
    btn.disabled  = true;
    try {
      await API.post('/auth/reset-password', { token, password });
      document.getElementById('resetView').style.display = 'none';
      document.getElementById('doneView').style.display  = 'block';
    } catch (e) {
      status('reset', 'error', e.message || 'Reset failed. The link may have expired.');
      btn.textContent = 'Reset Password';
      btn.disabled = false;
    }
  };
</script>
</body>
</html>
